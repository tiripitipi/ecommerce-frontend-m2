<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito – El Rincón del Tenis</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🎾 El rincon del Tenis</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item">
              <a class="nav-link active" href="carrito.html">
                🛒 Carrito
                <span class="badge bg-warning text-dark" id="cart-count">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="container my-4">
    <h1 class="mb-4">Tu Carrito</h1>

    <section>
      <!-- Aquí JavaScript va a insertar los productos -->
      <div id="carrito-container">
        <p class="text-muted">Tu carrito está vacío.</p>
      </div>

      <!-- Total -->
      <div class="border-top pt-3 mt-3 text-end">
        <h4>Total: <span id="carrito-total" class="text-success">$0</span></h4>
        <a href="index.html" class="btn btn-outline-secondary mt-2">← Seguir comprando</a>
        <button class="btn btn-warning mt-2 ms-2" id="btn-vaciar">🗑️ Vaciar carrito</button>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 El rincon del Tenis · Av siempreviva 742 · contacto@erdt.cl</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
