<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Producto – El Rincón del Tenis</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🎾 El rincon del Tenis</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item">
              <a class="nav-link" href="carrito.html">
                🛒 Carrito
                <span class="badge bg-warning text-dark" id="cart-count">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- CONTENIDO -->
  <main class="container my-4">
    <a href="index.html" class="btn btn-outline-secondary btn-sm mb-4">← Volver al inicio</a>

    <div class="row g-4 align-items-start">

      <!-- Imagen -->
      <div class="col-12 col-md-5">
        <img id="detalle-imagen" src="" alt="" class="img-fluid rounded shadow-sm" style="background:#f8f9fa; padding:20px;">
      </div>

      <!-- Info -->
      <div class="col-12 col-md-7">
        <article>
          <h1 id="detalle-nombre" class="mb-2">Cargando producto...</h1>
          <p id="detalle-descripcion" class="text-muted mb-3"></p>
          <p id="detalle-precio" class="fw-bold text-success fs-3 mb-4"></p>
          <button class="btn btn-warning btn-lg" id="btn-agregar">
            🛒 Agregar al carrito
          </button>
        </article>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 El rincon del Tenis · Av siempreviva 742 · contacto@erdt.cl</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
